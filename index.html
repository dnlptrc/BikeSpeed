<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIKE SPEED</title>
    <style>
        :root {
            --neon: #00ff41;
            --bg: #0a0a0a;
            --card: #161616;
            --text-dim: #666;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .logo { font-weight: 800; letter-spacing: -1px; font-size: 1.1rem; }
        .settings-icon { background: var(--card); padding: 6px 10px; border-radius: 10px; cursor: pointer; }

        .speed-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .speed-value {
            font-size: clamp(6rem, 30vw, 10rem);
            font-weight: 800;
            color: var(--neon);
            line-height: 0.9;
            text-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
        }

        .speed-unit {
            font-size: 0.9rem;
            color: var(--text-dim);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .bottom-section {
            background: var(--card);
            border-top-left-radius: 25px;
            border-top-right-radius: 25px;
            padding: 15px 15px 30px 15px; /* Spațiu extra jos pentru navigarea telefonului */
            flex-shrink: 0;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px; /* Distanță între cifre și buton */
        }

        .stat-card { text-align: center; }
        .stat-label { font-size: 8px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; }
        .stat-value { font-size: 1.1rem; font-weight: 600; }

        .controls { display: flex; width: 100%; }
        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: none;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .btn-start { background: var(--neon); color: black; }
        .btn-stop { background: #ff3b30; color: white; display: none; }

        #settingsOverlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 100;
            display: none;
            padding: 30px 20px;
        }

        .input-group { background: var(--card); padding: 15px; border-radius: 15px; margin-top: 20px; }
        input { background: transparent; border: none; border-bottom: 2px solid var(--neon); color: var(--neon); font-size: 2rem; width: 80px; text-align: center; }
        .history-item { padding: 10px 0; border-bottom: 1px solid #222; font-size: 0.8rem; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">BIKE <span style="color:var(--neon)">SPEED</span></div>
        <div class="settings-icon" onclick="toggleSettings()">⚙️</div>
    </div>

    <div class="speed-container">
        <div class="speed-value" id="speed">0</div>
        <div class="speed-unit">km/h</div>
    </div>

    <div class="bottom-section">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Distanță</div>
                <div class="stat-value" id="dist">0.0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Timp</div>
                <div class="stat-value" id="time">00:00</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Calorii</div>
                <div class="stat-value" id="kcal">0</div>
            </div>
        </div>

        <div class="controls">
            <button id="startBtn" class="btn btn-start" onclick="startRun()">START ACTIVITATE</button>
            <button id="stopBtn" class="btn btn-stop" onclick="stopRun()">FINALIZARE</button>
        </div>
    </div>

    <div id="settingsOverlay">
        <div style="font-size: 30px; margin-bottom: 20px;" onclick="toggleSettings()">✕</div>
        <div class="input-group">
            <div class="stat-label">Greutate Totală (KG)</div>
            <input type="number" id="weight" value="90" onchange="saveWeight()">
        </div>
        <div id="historyContent" style="margin-top: 20px;"></div>
    </div>

<script>
    let distance = 0, lastPos = null, startTime, timerIdx, watchIdx;

    window.onload = () => {
        if(localStorage.getItem('userW')) document.getElementById('weight').value = localStorage.getItem('userW');
        renderHistory();
    };

    function toggleSettings() {
        const el = document.getElementById('settingsOverlay');
        el.style.display = el.style.display === 'block' ? 'none' : 'block';
    }

    function saveWeight() {
        localStorage.setItem('userW', document.getElementById('weight').value);
    }

    async function startRun() {
        if ('wakeLock' in navigator) { try { await navigator.wakeLock.request('screen'); } catch(e) {} }
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'block';
        startTime = Date.now();
        timerIdx = setInterval(() => {
            const d = new Date(Date.now() - startTime);
            document.getElementById('time').innerText = `${d.getUTCMinutes().toString().padStart(2, '0')}:${d.getUTCSeconds().toString().padStart(2, '0')}`;
        }, 1000);

        watchIdx = navigator.geolocation.watchPosition(p => {
            const c = p.coords;
            const s = c.speed ? Math.round(c.speed * 3.6) : 0;
            document.getElementById('speed').innerText = s;
            if(lastPos && s > 0.5) {
                const R = 6371;
                const dLat = (c.latitude - lastPos.latitude) * Math.PI / 180;
                const dLon = (c.longitude - lastPos.longitude) * Math.PI / 180;
                const a = Math.sin(dLat/2)**2 + Math.cos(lastPos.latitude*Math.PI/180)*Math.cos(c.latitude*Math.PI/180)*Math.sin(dLon/2)**2;
                distance += (R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
                document.getElementById('dist').innerText = distance.toFixed(1);
                document.getElementById('kcal').innerText = Math.round(distance * parseFloat(document.getElementById('weight').value) * 0.15);
            }
            lastPos = c;
        }, null, { enableHighAccuracy: true });
    }

    function stopRun() {
        if(distance > 0.05) {
            const h = JSON.parse(localStorage.getItem('hRides') || "[]");
            h.unshift({ d: new Date().toLocaleDateString(), k: distance.toFixed(1), c: document.getElementById('kcal').innerText });
            localStorage.setItem('hRides', JSON.stringify(h.slice(0, 5)));
        }
        location.reload();
    }

    function renderHistory() {
        const h = JSON.parse(localStorage.getItem('hRides') || "[]");
        document.getElementById('historyContent').innerHTML = h.map(r => `<div class="history-item"><span>${r.d}</span> <strong>${r.k} km</strong></div>`).join('');
    }
</script>
</body>
</html>
