<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BIKE SPEED PRO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --neon: #00ff41; --bg: #000; --card: #121212; --text-dim: #888; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: white; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .header { padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: rgba(0,0,0,0.6); position: relative; }
        .logo { font-weight: 800; font-size: 1rem; }
        .settings-icon { background: var(--card); padding: 5px 10px; border-radius: 8px; cursor: pointer; border: 1px solid #333; }

        #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* Control straturi mutat mai jos de header */
        .leaflet-control-layers { margin-top: 60px !important; margin-right: 15px !important; background: var(--card) !important; color: white !important; border: 1px solid var(--neon) !important; }

        .speed-overlay { position: relative; flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; pointer-events: none; }
        .speed-value { font-size: 8.5rem; font-weight: 900; color: var(--neon); line-height: 0.8; text-shadow: 0 0 25px rgba(0,0,0,0.9), 2px 2px 5px #000; }
        .speed-unit { font-size: 1rem; color: #fff; letter-spacing: 4px; text-shadow: 2px 2px 5px #000; font-weight: bold; }

        .bottom-section { position: absolute; bottom: 0; left: 0; right: 0; background: var(--card); padding: 15px 15px 35px 15px; border-top: 3px solid var(--neon); z-index: 1000; box-shadow: 0 -10px 20px rgba(0,0,0,0.5); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-card { text-align: center; }
        .stat-label { font-size: 8px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 1.2rem; font-weight: 800; color: #fff; }

        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 900; font-size: 1rem; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-start { background: var(--neon); color: #000; }
        .btn-stop { background: #ff3b30; color: white; display: none; }
        .btn:active { transform: scale(0.98); }

        #settingsOverlay { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: none; padding: 30px; }
        input { background: transparent; border: none; border-bottom: 2px solid var(--neon); color: var(--neon); font-size: 2.5rem; width: 100px; text-align: center; outline: none; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="header">
        <div class="logo">BIKE <span style="color:var(--neon)">SPEED</span></div>
        <div class="settings-icon" onclick="toggleSettings()">⚙️</div>
    </div>

    <div class="speed-overlay">
        <div class="speed-value" id="speed">0</div>
        <div class="speed-unit">km/h</div>
    </div>

    <div class="bottom-section">
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-label">Dist.</div><div class="stat-value" id="dist">0.0</div></div>
            <div class="stat-card"><div class="stat-label">Timp</div><div class="stat-value" id="time">00:00</div></div>
            <div class="stat-card"><div class="stat-label">Kcal</div><div class="stat-value" id="kcal">0</div></div>
        </div>
        <button id="startBtn" class="btn btn-start" onclick="startRun()">START ACTIVITATE</button>
        <button id="stopBtn" class="btn btn-stop" onclick="stopRun()">FINALIZARE</button>
    </div>

    <div id="settingsOverlay">
        <div style="font-size: 30px; margin-bottom: 30px;" onclick="toggleSettings()">✕</div>
        <div style="background: #111; padding: 25px; border-radius: 15px; border: 1px solid #333;">
            <div style="font-size: 11px; color: var(--text-dim); text-transform: uppercase;">Greutate Totală (KG)</div>
            <input type="number" id="weight" value="90" onchange="saveWeight()">
        </div>
        <div id="historyContent" style="margin-top: 30px;"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let distance = 0, lastPos = null, startTime, timerIdx, watchIdx, map, marker, path;
        let coordsHistory = [];

        // Definire straturi
        const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
        const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
        const topo = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png');

        window.onload = () => {
            initMap();
            if(localStorage.getItem('userW')) document.getElementById('weight').value = localStorage.getItem('userW');
            renderHistory();
        };

        function initMap() {
            map = L.map('map', { 
                zoomControl: false, 
                attributionControl: false,
                layers: [osm] // Stratul implicit
            }).setView([44.43, 26.10], 15);

            // Obiectul pentru selectorul de straturi
            const baseMaps = {
                "Harta": osm,
                "Satelit": satellite,
                "Topo": topo
            };

            // Adăugăm controlul pe hartă
            L.control.layers(baseMaps, null, { position: 'topright' }).addTo(map);
            
            marker = L.circleMarker([0,0], { radius: 7, color: '#fff', fillColor: '#007bff', fillOpacity: 1, weight: 3 }).addTo(map);
            path = L.polyline([], { color: '#00ff41', weight: 6, opacity: 0.8 }).addTo(map);
        }

        function toggleSettings() {
            const el = document.getElementById('settingsOverlay');
            el.style.display = el.style.display === 'block' ? 'none' : 'block';
        }

        function saveWeight() { localStorage.setItem('userW', document.getElementById('weight').value); }

        async function startRun() {
            if ('wakeLock' in navigator) { try { await navigator.wakeLock.request('screen'); } catch(e) {} }
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'block';
            startTime = Date.now();
            timerIdx = setInterval(() => {
                const d = new Date(Date.now() - startTime);
                document.getElementById('time').innerText = `${d.getUTCMinutes().toString().padStart(2, '0')}:${d.getUTCSeconds().toString().padStart(2, '0')}`;
            }, 1000);

            watchIdx = navigator.geolocation.watchPosition(p => {
                const lat = p.coords.latitude;
                const lon = p.coords.longitude;
                const s = p.coords.speed ? Math.round(p.coords.speed * 3.6) : 0;
                document.getElementById('speed').innerText = s;
                
                const newPos = [lat, lon];
                map.panTo(newPos);
                marker.setLatLng(newPos);
                
                if(lastPos && s > 0.5) {
                    const R = 6371;
                    const dLat = (lat - lastPos.lat) * Math.PI / 180;
                    const dLon = (lon - lastPos.lon) * Math.PI / 180;
                    const a = Math.sin(dLat/2)**2 + Math.cos(lastPos.lat*Math.PI/180)*Math.cos(lat*Math.PI/180)*Math.sin(dLon/2)**2;
                    distance += (R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
                    
                    document.getElementById('dist').innerText = distance.toFixed(1);
                    document.getElementById('kcal').innerText = Math.round(distance * parseFloat(document.getElementById('weight').value) * 0.15);
                    
                    coordsHistory.push(newPos);
                    path.setLatLngs(coordsHistory);
                }
                lastPos = {lat, lon};
            }, null, { enableHighAccuracy: true });
        }

        function stopRun() {
            if(distance > 0.05) {
                const h = JSON.parse(localStorage.getItem('hRides') || "[]");
                h.unshift({ d: new Date().toLocaleDateString(), k: distance.toFixed(1) });
                localStorage.setItem('hRides', JSON.stringify(h.slice(0, 5)));
            }
            location.reload();
        }

        function renderHistory() {
            const h = JSON.parse(localStorage.getItem('hRides') || "[]");
            document.getElementById('historyContent').innerHTML = h.map(r => `<div style="padding:15px 0; border-bottom:1px solid #222; font-size:14px; display:flex; justify-content:space-between;"><span>${r.d}</span><strong>${r.k} km</strong></div>`).join('');
        }
    </script>
</body>
</html>
