
<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bike Pro Elite</title>
    <style>
        :root {
            --neon: #00ff41; /* Verde Matrix/Sport */
            --bg: #0a0a0a;
            --card: #161616;
            --text-dim: #666;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Header cu Setări */
        .header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .settings-icon {
            font-size: 24px;
            background: var(--card);
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
        }

        /* Display Viteză Principal */
        .speed-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .speed-value {
            font-size: 120px;
            font-weight: 800;
            color: var(--neon);
            line-height: 0.8;
            text-shadow: 0 0 30px rgba(0, 255, 65, 0.2);
        }

        .speed-unit {
            font-size: 18px;
            color: var(--text-dim);
            margin-top: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* Panou de Statistici (Carduri) */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            padding: 20px;
            background: var(--card);
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
        }

        .stat-card {
            text-align: center;
        }

        .stat-label {
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 600;
        }

        /* Butoane Acțiune */
        .controls {
            padding: 20px;
            background: var(--card);
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 18px;
            border-radius: 15px;
            border: none;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .btn-start { background: var(--neon); color: black; }
        .btn-stop { background: #ff3b30; color: white; display: none; }
        .btn:active { transform: scale(0.95); }

        /* Overlay Setări */
        #settingsOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            display: none;
            padding: 40px 20px;
        }

        .input-group {
            background: var(--card);
            padding: 20px;
            border-radius: 20px;
            margin-top: 20px;
        }

        input {
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--neon);
            color: var(--neon);
            font-size: 32px;
            width: 100px;
            text-align: center;
            font-family: inherit;
        }

        .history-list {
            margin-top: 30px;
            max-height: 200px;
            overflow-y: auto;
        }

        .history-item {
            padding: 10px 0;
            border-bottom: 1px solid #222;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight: 800; letter-spacing: -1px;">CICLO<span style="color:var(--neon)">PRO</span></div>
        <div class="settings-icon" onclick="toggleSettings()">⚙️</div>
    </div>

    <div class="speed-container">
        <div class="speed-value" id="speed">0</div>
        <div class="speed-unit">km/h</div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">Distanță</div>
            <div class="stat-value" id="dist">0.0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Timp</div>
            <div class="stat-value" id="time">00:00</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Calorii</div>
            <div class="stat-value" id="kcal">0</div>
        </div>
    </div>

    <div class="controls">
        <button id="startBtn" class="btn btn-start" onclick="startRun()">START ACTIVITATE</button>
        <button id="stopBtn" class="btn btn-stop" onclick="stopRun()">FINALIZARE</button>
    </div>

    <div id="settingsOverlay">
        <div style="font-size: 30px;" onclick="toggleSettings()">✕</div>
        <div class="input-group">
            <div class="stat-label">Greutate Totală (KG)</div>
            <input type="number" id="weight" value="90" onchange="saveWeight()">
            <div style="color: var(--text-dim); font-size: 12px; margin-top: 10px;">Tu + Bicicletă + Accesorii</div>
        </div>

        <div class="history-list">
            <div class="stat-label">Istoric Activități</div>
            <div id="historyContent"></div>
        </div>
    </div>

<script>
    let distance = 0, lastPos = null, startTime, timerIdx, watchIdx;

    window.onload = () => {
        if(localStorage.getItem('userW')) document.getElementById('weight').value = localStorage.getItem('userW');
        renderHistory();
    };

    function toggleSettings() {
        const el = document.getElementById('settingsOverlay');
        el.style.display = el.style.display === 'block' ? 'none' : 'block';
    }

    function saveWeight() {
        localStorage.setItem('userW', document.getElementById('weight').value);
    }

    async function startRun() {
        if ('wakeLock' in navigator) await navigator.wakeLock.request('screen');
        
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'block';

        startTime = Date.now();
        timerIdx = setInterval(() => {
            const d = new Date(Date.now() - startTime);
            document.getElementById('time').innerText = 
                `${d.getUTCMinutes().toString().padStart(2, '0')}:${d.getUTCSeconds().toString().padStart(2, '0')}`;
        }, 1000);

        watchIdx = navigator.geolocation.watchPosition(p => {
            const c = p.coords;
            const s = c.speed ? Math.round(c.speed * 3.6) : 0;
            document.getElementById('speed').innerText = s;

            if(lastPos && s > 0.5) {
                const R = 6371;
                const dLat = (c.latitude - lastPos.latitude) * Math.PI / 180;
                const dLon = (c.longitude - lastPos.longitude) * Math.PI / 180;
                const a = Math.sin(dLat/2)**2 + Math.cos(lastPos.latitude*Math.PI/180)*Math.cos(c.latitude*Math.PI/180)*Math.sin(dLon/2)**2;
                const d = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                
                distance += d;
                document.getElementById('dist').innerText = distance.toFixed(1);
                const cal = distance * parseFloat(document.getElementById('weight').value) * 0.15;
                document.getElementById('kcal').innerText = Math.round(cal);
            }
            lastPos = c;
        }, null, { enableHighAccuracy: true });
    }

    function stopRun() {
        if(distance > 0.05) {
            const h = JSON.parse(localStorage.getItem('hRides') || "[]");
            h.unshift({ d: new Date().toLocaleDateString(), k: distance.toFixed(1), c: document.getElementById('kcal').innerText });
            localStorage.setItem('hRides', JSON.stringify(h.slice(0, 5)));
        }
        location.reload();
    }

    function renderHistory() {
        const h = JSON.parse(localStorage.getItem('hRides') || "[]");
        document.getElementById('historyContent').innerHTML = h.map(r => 
            `<div class="history-item"><span>${r.d}</span> <strong>${r.k} km</strong> <span>${r.c} kcal</span></div>`
        ).join('');
    }
</script>
</body>
</html>
